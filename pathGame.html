<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        .controls {
            margin: 10px;
            padding: 16px 0;
        }

        .controls input[type="number"] {
            padding: 6px 10px;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 16px;
            width: 70px;
            margin: 0 8px 0 2px;
            background: #fff;
            transition: border-color 0.2s;
        }

        .controls input[type="number"]:focus {
            border-color: #3498db;
            outline: none;
        }

        .controls button {
            padding: 7px 18px;
            margin-left: 8px;
            font-size: 16px;
            background: linear-gradient(90deg, #3498db 60%, #2ecc71 100%);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(52,152,219,0.08);
            transition: background 0.2s, box-shadow 0.2s;
        }

        .controls button:hover {
            background: linear-gradient(90deg, #2980b9 60%, #27ae60 100%);
            box-shadow: 0 4px 12px rgba(52,152,219,0.15);
        }

        svg {
            background: white;
            border: 1px solid #ccc;
            margin-top: 10px;
            max-width: 100%;
            height: auto;
        }

        .circle {
            fill: white;
            stroke-width: 3;
        }

        .text {
            font-size: 18px;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .op {
            font-size: 18px;
            fill: #333;
        }

        .path-line {
            fill: none;
            stroke: #bbb;
            stroke-width: 2;
            stroke-dasharray: 6, 6;
            marker-end: url(#arrow);
            /* ✅ arrow */
        }

        @media print {
            .controls {
                display: none;
            }

            body {
                background: white;
            }
        }
    </style>
</head>

<body>
    <table border="0" width="100%"><tr><td>Name:</td><td>Date:</td></tr></table>
    <h3>Number Path Worksheet</h3>

    <div class="controls">
        Circles: <input type="number" id="count" value="20" min="2">
        Max Number: <input type="number" id="maxVal" value="10" min="1">
        Max Summation: <input type="number" id="maxSummation" value="25" min="1">
        <button onclick="generateAll()">Generate</button>
        <button onclick="window.print()">Print</button>
    </div>

    <svg id="block1" width="850" height="450" aria-label="Math Path 1"></svg>
    <br>
    <br>
    <svg id="block2" width="850" height="450" aria-label="Math Path 2"></svg>

    <script>

        // Returns a random color from a nice palette
        function getRandomColor() {
            const colors = [
                "#e74c3c", "#3498db", "#2ecc71",
                "#f39c12", "#9b59b6", "#16a085"
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function generate(docId) {
            // Main generator for a math path SVG
            const svg = document.getElementById(docId);
            svg.innerHTML = "";

            // Cap max count for performance
            const count = Math.min(+document.getElementById("count").value, 40);
            const maxVal = +document.getElementById("maxVal").value;
            const maxSummation = +document.getElementById("maxSummation").value;
            const randomeNodeIndex = Math.floor(Math.random() * Math.min(maxVal, 7)) + 1;            

            const nodes = [];
            const operators = [];
            const nodeAnswer = [];

            const cols = 8;
            
            const spacingX = 90;
            const spacingY = 90;
            const startX = 60;
            const startY = 60;
            const startValue = Math.floor(Math.random() * maxVal) + 1;
            let solution = startValue;            

            // Define arrow marker (once per render)
            const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
            marker.setAttribute("id", "arrow");
            marker.setAttribute("markerWidth", "10");
            marker.setAttribute("markerHeight", "10");
            marker.setAttribute("refX", "8");
            marker.setAttribute("refY", "3");
            marker.setAttribute("orient", "auto");
            const arrowPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
            arrowPath.setAttribute("d", "M0,0 L0,8 L12,4 z");
            arrowPath.setAttribute("fill", "#333");
            marker.appendChild(arrowPath);
            defs.appendChild(marker);
            svg.appendChild(defs);

            // Create snake layout
            for (let i = 0; i < count; i++) {
                const row = Math.floor(i / cols);
                const col = i % cols;
                let x = startX + col * spacingX;
                let y = startY + row * spacingY;
                if (row % 2 === 1) {
                    x = startX + (cols - 1 - col) * spacingX;
                }
                nodes.push({ x, y });
                if (i > 0) {
                    let sign;
                    let num;
                    let result;
                    do {
                        sign = Math.random() > 0.5 ? "+" : "-";
                        num = Math.floor(Math.random() * maxVal) + 1;
                        result = solution + (sign === "+" ? num : -num);
                    } while (result < 0 || result > maxSummation);

                    // solution = solution + (sign === "+" ? num : -num);
                    solution = result;
                    nodeAnswer.push(solution);
                    operators.push(sign + num);
                }
            }

            // Draw curved path with arrows
            let d = `M ${nodes[0].x} ${nodes[0].y}`;
            for (let i = 1; i < nodes.length; i++) {
                const prev = nodes[i - 1];
                const curr = nodes[i];
                const cx = (prev.x + curr.x) / 2;
                const cy = (prev.y + curr.y) / 2;
                d += ` Q ${cx} ${cy}, ${curr.x} ${curr.y}`;
            }
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", d);
            path.setAttribute("class", "path-line");
            svg.appendChild(path);


            // Draw operators
            for (let i = 0; i < nodes.length - 1; i++) {
                const a = nodes[i];
                const b = nodes[i + 1];
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", (a.x + b.x) / 2);
                text.setAttribute("y", (a.y + b.y) / 2 - 8);
                text.setAttribute("class", "op");
                text.textContent = operators[i];
                svg.appendChild(text);
            }


            // Draw circles with random border colors and accessible titles
            nodes.forEach((node, index) => {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", node.x);
                circle.setAttribute("cy", node.y);
                circle.setAttribute("r", 20);
                circle.setAttribute("class", "circle");
                circle.setAttribute("stroke", getRandomColor());
                // Accessibility: add title
                const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
                title.textContent = index === 0 ? `Start: ${startValue}` : `Step ${index}: ${nodeAnswer[index - 1] || ''}`;
                circle.appendChild(title);
                svg.appendChild(circle);

                // starting number
                // Show number for the first circle and the first circle in each row
                let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", node.x);
                text.setAttribute("y", node.y);
                text.setAttribute("class", "text");
                if (index === 0) {
                    text.textContent = startValue;
                } else if (index % cols === randomeNodeIndex) {
                    text.textContent = nodeAnswer[index - 1];
                }
                svg.appendChild(text);

            });
        }
        
        function generateAll() {
            generate("block1");
            generate("block2");
        }

        // initial load
        generateAll();
    </script>

</body>

</html>
